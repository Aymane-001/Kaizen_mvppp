# ═══════════════════════════════════════════════
# KIRO — nginx.conf
# Put this at: /etc/nginx/sites-available/kiro
# Then: sudo ln -s /etc/nginx/sites-available/kiro /etc/nginx/sites-enabled/kiro
# Then: sudo nginx -t && sudo systemctl reload nginx
# ═══════════════════════════════════════════════

server {
    listen 80;
    server_name localhost;  # Change to your IP or domain when deploying

    # ── Frontend (static files) ──────────────────
    root /var/www/kiro;     # where you copy the frontend/ folder
    index index.html;

    # Handle SPA routing — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Backend REST API ─────────────────────────
    # Requests to /api/* and /health → Node.js on port 3001
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    location /health {
        proxy_pass http://127.0.0.1:3001;
    }

    # ── WebSocket upgrade ────────────────────────
    # Frontend connects to ws://yourserver:3001 directly (no nginx proxy needed for WS on LAN)
    # If you want to proxy WS through nginx port 80, uncomment below:
    # location /ws {
    #     proxy_pass          http://127.0.0.1:3001;
    #     proxy_http_version  1.1;
    #     proxy_set_header    Upgrade    $http_upgrade;
    #     proxy_set_header    Connection "upgrade";
    #     proxy_read_timeout  86400;
    # }

    # ── Security headers ─────────────────────────
    add_header X-Frame-Options      "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy      "strict-origin-when-cross-origin";

    # ── Static file caching ──────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
